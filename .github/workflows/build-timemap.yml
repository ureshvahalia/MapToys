name: Build TimeMap Installers

# Runs automatically on version tags (e.g. v1.0.0) or manually via the Actions tab.
# Produces a Windows .exe installer and a macOS .dmg, then attaches them to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed to create/update GitHub Releases

defaults:
  run:
    working-directory: TimeMap   # all steps run inside the TimeMap subdirectory

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact_path: TimeMap/electron/release/*.exe
            artifact_name: TimeMap-Windows

          - os: macos-latest
            script: dist:mac
            artifact_path: TimeMap/electron/release/*.dmg
            artifact_name: TimeMap-Mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm run install:all

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('electron/package.json', 'utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('electron/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "Set electron version to $VERSION"

      - name: Import certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | tr -d ' \n\r' | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Build and sign Swift photos helper (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          swiftc electron/photos-helper.swift -o electron/photos-helper
          chmod +x electron/photos-helper
          APP_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
          codesign --force --verify --verbose \
            --sign "$APP_IDENTITY" \
            --options runtime \
            --entitlements electron/build/entitlements.helper.plist \
            electron/photos-helper

      - name: Build and package
        run: npm run ${{ matrix.script }}

      - name: Notarize and staple DMGs (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in electron/release/*.dmg; do
            echo "Notarizing $dmg..."
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            echo "Stapling $dmg..."
            xcrun stapler staple "$dmg"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      # Only attach to a GitHub Release when triggered by a version tag
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
